name: Feature request
description: Suggest a product improvement or enhancement for BudgetFlow.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: input
    id: summary
    attributes:
      label: Feature summary
      placeholder: Add recurring budget transfers
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What problem would this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the ideal user-facing behavior or implementation direction.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Note any alternative ideas or tradeoffs.
